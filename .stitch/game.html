<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Tic-Tac-Toe Neon</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "primary": "#00E5FF",
                "background-light": "#f5fbfb",
                "background-dark": "#0a1619",
              },
              fontFamily: {
                "display": ["Space Grotesk"]
              },
              borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            },
          },
        }
    </script>
<style>
        .neon-glow-primary {
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
        }
        .neon-line {
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.6);
        }
        .bg-mesh {
            background-color: #0a1619;
            background-image: 
                radial-gradient(at 0% 0%, rgba(0, 229, 255, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 229, 255, 0.1) 0px, transparent 50%);
        }
    </style>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col overflow-x-hidden">
<div class="relative flex h-full min-h-screen w-full flex-col bg-mesh">
<header class="flex items-center p-4 pb-2 justify-between border-b border-primary/10">
<div class="flex size-12 shrink-0 items-center justify-center">
<span class="material-symbols-outlined text-primary text-2xl">settings</span>
</div>
<h2 class="text-slate-100 text-xl font-bold leading-tight tracking-tight flex-1 text-center uppercase tracking-[0.1em]">Tic-Tac-Neon</h2>
<div class="flex w-12 items-center justify-end">
<button class="flex items-center justify-center rounded-xl h-12 w-12 bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">refresh</span>
</button>
</div>
</header>
<main class="flex-1 flex flex-col items-center max-w-md mx-auto w-full px-4 py-6">
<div class="grid grid-cols-2 gap-4 w-full mb-8">
<div class="flex flex-col gap-1 rounded-xl p-4 bg-primary/10 border border-primary/20 neon-glow-primary">
<div class="flex items-center gap-2">
<span class="text-xl">😀</span>
<p class="text-slate-300 text-sm font-medium uppercase tracking-wider">Player</p>
</div>
<p class="text-primary text-3xl font-bold">3</p>
</div>
<div class="flex flex-col gap-1 rounded-xl p-4 bg-slate-800/40 border border-slate-700/50">
<div class="flex items-center gap-2">
<span class="text-xl">🤖</span>
<p class="text-slate-400 text-sm font-medium uppercase tracking-wider">Robot</p>
</div>
<p class="text-slate-100 text-3xl font-bold">2</p>
</div>
</div>
<div class="text-center mb-8">
<h4 class="text-primary/80 text-sm font-bold uppercase tracking-[0.2em] mb-1">Current Turn</h4>
<div class="flex items-center justify-center gap-2">
<span class="text-3xl animate-pulse">😀</span>
<span class="text-slate-100 font-bold text-lg">Your Move</span>
</div>
</div>
<div class="relative w-full aspect-square max-w-[340px] grid grid-cols-3 grid-rows-3 gap-3 p-3 bg-slate-900/50 rounded-2xl border border-primary/20 neon-glow-primary">
<div class="absolute inset-0 grid grid-cols-3 pointer-events-none opacity-40">
<div class="border-r border-primary neon-line h-full"></div>
<div class="border-r border-primary neon-line h-full"></div>
<div></div>
</div>
<div class="absolute inset-0 grid grid-rows-3 pointer-events-none opacity-40">
<div class="border-b border-primary neon-line w-full"></div>
<div class="border-b border-primary neon-line w-full"></div>
<div></div>
</div>
<button class="relative z-10 flex items-center justify-center bg-primary/5 hover:bg-primary/10 transition-all rounded-lg text-4xl group">
<span class="opacity-0 group-hover:opacity-30 transition-opacity">😀</span>
</button>
<button class="relative z-10 flex items-center justify-center bg-primary/5 hover:bg-primary/10 transition-all rounded-lg text-4xl">
<span class="text-primary drop-shadow-[0_0_8px_rgba(0,229,255,0.8)]">😀</span>
</button>
<button class="relative z-10 flex items-center justify-center bg-primary/5 hover:bg-primary/10 transition-all rounded-lg text-4xl group">
<span class="opacity-0 group-hover:opacity-30 transition-opacity">😀</span>
</button>
<button class="relative z-10 flex items-center justify-center bg-primary/5 hover:bg-primary/10 transition-all rounded-lg text-4xl">
<span class="text-slate-400">🤖</span>
</button>
<button class="relative z-10 flex items-center justify-center bg-primary/5 hover:bg-primary/10 transition-all rounded-lg text-4xl">
<span class="text-primary drop-shadow-[0_0_8px_rgba(0,229,255,0.8)]">😀</span>
</button>
<button class="relative z-10 flex items-center justify-center bg-primary/5 hover:bg-primary/10 transition-all rounded-lg text-4xl group">
</button>
<button class="relative z-10 flex items-center justify-center bg-primary/5 hover:bg-primary/10 transition-all rounded-lg text-4xl">
<span class="text-slate-400">🤖</span>
</button>
<button class="relative z-10 flex items-center justify-center bg-primary/5 hover:bg-primary/10 transition-all rounded-lg text-4xl group">
</button>
<button class="relative z-10 flex items-center justify-center bg-primary/5 hover:bg-primary/10 transition-all rounded-lg text-4xl group">
</button>
</div>
<div class="mt-10 w-full flex flex-col gap-4">
<div class="bg-primary/10 border border-primary/20 rounded-xl p-4 flex items-center gap-4">
<div class="size-10 rounded-full bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary">info</span>
</div>
<p class="text-sm text-slate-300">You need 1 more win to level up your neon rank!</p>
</div>
</div>
</main>
<nav class="sticky bottom-0 mt-auto flex gap-2 border-t border-primary/20 bg-background-dark/80 backdrop-blur-md px-4 pb-6 pt-2">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined fill-1">sports_esports</span>
</div>
<p class="text-xs font-bold uppercase tracking-wider">Play</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">leaderboard</span>
</div>
<p class="text-xs font-medium uppercase tracking-wider">Ranks</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">person</span>
</div>
<p class="text-xs font-medium uppercase tracking-wider">Profile</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-primary transition-colors" href="#">
<div class="flex h-8 items-center justify-center">
<span class="material-symbols-outlined">shopping_bag</span>
</div>
<p class="text-xs font-medium uppercase tracking-wider">Shop</p>
</a>
</nav>
</div>
